<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoM Solar Energy - Reporting Tool</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h2>Masuk ke Sistem</h2>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passwordInput" placeholder="Password">
            <button onclick="prosesLogin()">Login</button>
            <p id="loginError" style="color:red; display:none; margin-top:10px;"></p>
        </div>
    </div>

    <div class="toolbar" style="display:none;">
        <button id="backToDayBtn" onclick="home()">🏠 Home</button>
        <h2 id="judul">Daily Report MoM</h2>
        <button onclick="prosesLogout()" style="background:#e74c3c;">Logout</button>
    </div>

    <div class="main" style="display:none;">
        
        <div id="statContainer" class="stat-container" style="display:none;">
            <div class="stat-box" style="background:#2ecc71;">Open: <span id="countOpen">0</span></div>
            <div class="stat-box" style="background:#f1c40f; color:black;">Process: <span id="countProcess">0</span></div>
            <div class="stat-box" style="background:#34495e;">Close: <span id="countClose">0</span></div>
        </div>

        <div id="filterGlobalContainer" style="display:none; justify-content:center; gap:10px; margin: 15px 0;">
            <button onclick="loadSummaryGlobal('terbaru')" class="btn-filter" id="btnTerbaru">Update Terbaru</button>
            <button onclick="loadSummaryGlobal('semua')" class="btn-filter" id="btnSemua">Semua Histori</button>
        </div>

        <div id="momContainer">
            <div class="table-wrapper">
                <table id="momTable">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th class="col-hari">Waktu</th>
                            <th>Matters of Discussion</th>
                            <th>Problem / Description</th>
                            <th class="col-tanggal">Info Asal</th>
                            <th>PIC</th>
                            <th>EPC</th>
                            <th>Due Date</th>
                            <th>Done Date</th>
                            <th>Aging</th>
                            <th>Status</th>
                            <th>Remarks</th>
                            <th id="colDelete">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>

            <div id="actionButtons" class="action-bar">
                <button onclick="tambah()" class="add-btn">+ Baris Baru</button>
                <button onclick="tambah(true)" class="sub-btn">+ Sub Baris</button>
                <button onclick="tarikDataKemarin()" class="pull-btn">🔄 Tarik Task Open</button>
                <button onclick="save()" class="save-btn">💾 Simpan ke Cloud</button>
                <button onclick="loadSummaryGlobal('terbaru')" class="summary-btn">📊 Global Summary</button>
                <button onclick="loadKegiatan()" class="gallery-btn">📸 Galeri Kegiatan</button>
            </div>
        </div>

        <div id="kegiatanContainer" style="display:none;">
            <div id="filterKegiatanContainer" class="stat-container">
                <div class="stat-box" onclick="fetchFoto('Semua')">Semua</div>
                <div class="stat-box" onclick="fetchFoto('Lapangan')">Lapangan</div>
                <div class="stat-box" onclick="fetchFoto('Meeting')">Meeting</div>
                <div class="stat-box" onclick="fetchFoto('Bebas')">Bebas</div>
            </div>
            
            <button id="btnToggleUpload" onclick="toggleUploadForm()" class="add-btn">Upload Foto Baru</button>
            
            <div id="formUploadFoto" class="upload-box" style="display:none;">
                <input type="file" id="fotoInput" accept="image/*">
                <select id="kategoriFoto">
                    <option value="Lapangan">Lapangan</option>
                    <option value="Meeting">Meeting</option>
                    <option value="Bebas">Bebas</option>
                </select>
                <textarea id="fotoKomentar" placeholder="Tulis keterangan foto..."></textarea>
                <button onclick="uploadFoto()" class="add-btn">Kirim Foto</button>
            </div>

            <div id="galleryContainer" class="gallery-grid"></div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="tutupLightbox()">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="imgLightbox">
        <div id="captionLightbox"></div>
    </div>

    <script src="script.js"></script>
    <script type="module" src="firebase-module.js"></script>
</body>
</html>
